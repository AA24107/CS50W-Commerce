{% extends "auctions/layout.html" %}

{% block title %} Create {% endblock %}

{% block body %}
<h2>Create Listing</h2>
<hr>
<div class="">
    <form action="{% url 'create' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input class="form-control" autofocus type="text" name="title" placeholder="Title">
        </div>
        <div class="form-group">
            <input class="form-control" type="text" name="description" placeholder="Description">
        </div>
        <div class="form-group">
            <input class="form-control" type="number" step="0.01" min="0" name="initial_price" placeholder="Initial Price">
        </div>
        <div class="form-group">
            <input class="form-control" type="text" name="category" placeholder="Category" >
        </div>
        <div class="form-group">
            <input type="checkbox" id="active" name="active" value= "active" checked>
            <label>Active</label>
        </div>
        <div class="form-group">
            <input class="form-control" type="url" name="image_url" placeholder="Image URL (optional)">
        </div>
        <div>
            <input class="btn btn-primary" type="submit" value="create">
        </div>

        

</div>
{% endblock %}
